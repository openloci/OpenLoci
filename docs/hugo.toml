baseURL      = "https://openloci.org/"
languageCode = "en-us"
theme        = "palace"

title = "OpenLoci"

[Params]
  author = "Jonah Bossewitch"
  motto  = "A filesystem-native collaborative Memory Palace for distributed cognition."
  footer = "Memory is the treasury and guardian of all things. — Cicero"

[Params.logo]
  title       = "OpenLoci"
  title_short = "OpenLoci"
  subtitle    = "A filesystem-native collaborative Memory Palace for distributed cognition."
  image       = "images/palace-sigil.svg"

[Params.hero]
  image             = "images/palace-banner.jpg"
  quote             = "A finite game is played for the purpose of winning. An infinite game is played for the purpose of continuing the play."
  quote_attribution = "James P. Carse, Finite and Infinite Games (1986)"

[Params.site]
  github = "https://github.com/openloci/OpenLoci"
  pypi   = "https://pypi.org/project/openloci/"

[Params.palace]
  rooms_enabled = false
  skin          = "default"

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "monokai"

