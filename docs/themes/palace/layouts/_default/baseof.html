<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="{{ if .IsHome }}home{{ else if .IsPage }}single{{ else }}list{{ end }}">
  {{ partial "header.html" . }}
  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
