<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.motto }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.motto }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}">
<meta name="author" content="{{ .Site.Params.author }}">

{{- with .OutputFormats.Get "rss" }}
<link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Site.Title }}">
{{- end }}

<!-- Palace palette, EB Garamond -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
{{ $skin := .Site.Params.palace.skin | default "default" }}
<link rel="stylesheet" href="{{ printf "css/skins/%s.css" $skin | relURL }}">
