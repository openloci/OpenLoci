<header class="site-header">
  <div class="site-header__inner">
    <div class="site-identity">
      {{ with .Site.Params.logo.image }}
      <a href="{{ "/" | relURL }}" class="site-logo-link" aria-label="Home">
        <img src="{{ . | relURL }}" alt="{{ $.Site.Title }} logo" class="site-logo">
      </a>
      {{ end }}
      <div class="site-identity__text">
        <a href="{{ "/" | relURL }}" class="site-title">
          <span class="site-title__full">{{ .Site.Params.logo.title | default .Site.Title }}</span>
          {{- with .Site.Params.logo.title_short }}
          <span class="site-title__short">{{ . }}</span>
          {{- end }}
        </a>
        <p class="site-motto"><em>{{ .Site.Params.logo.subtitle | default .Site.Params.motto }}</em></p>
      </div>
    </div>
    <nav class="site-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | absURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
